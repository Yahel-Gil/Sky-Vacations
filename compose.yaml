# docker compose up -d --build
# docker compose down

# Our entire services (containers)
services:

  # MySQL service:
  mysql-service:

    # Download the following image from DockerHub:
    image: mysql:8

    # What is the container name:
    container_name: mysql-container

    # Environment variables needed by mysql8:
    environment:
      MYSQL_HOST: localhost
      MYSQL_USER: JohnBryce
      MYSQL_PASSWORD: Yg250199
      MYSQL_DATABASE: sky_vacations
      MYSQL_ROOT_PASSWORD: Yg250199


    # Volumes:
    volumes:
      - mysql-volume:/var/lib/mysql
      - ./Database:/docker-entrypoint-initdb.d

    # Restart policy - when to restart the container:
    restart: unless-stopped

    # Constantly check if our server works:
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

#-------------------------------------------------------------------------------------------

  # Our Sky vacations backend:
  backend-service:

    # which other services we're depending on - we need to wait:
    depends_on:
      mysql-service:
        condition: service_healthy
  
    # Build context - what is the current folder:
    build:
      context: .
      dockerfile: ./Backend/Dockerfile

    # What is the image name:
    image: yahelgil/backend-image:1.0

    # What is the container name:
    container_name: backend-container

    # Environment variables needed by our backend:
    environment:
      MYSQL_HOST: mysql-service # service name is the name of the computer we need to connect
      MYSQL_USER: JohnBryce
      MYSQL_PASSWORD: Yg250199
      MYSQL_DATABASE: sky_vacations

    # Port mapping (hostPort:containerPort)
    ports:
      - 4000:4000

    # Volumes:
    volumes:
      - images-volume:/app/src/1-assets/images 
    
    # Restart policy - when to restart the container:
    restart: unless-stopped

    # Constantly check if our server works:
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:4000/ping', response => process.exit(response.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# -------------------------------------------------------------------------------------------------

  # Our northwind backend:
  frontend-service:

    # which other services we're depending on - we need to wait:
    depends_on:
      backend-service:
        condition: service_healthy

    # Build context - what is the current folder:
    build:
      context: .
      dockerfile: ./Frontend/Dockerfile

    # What is the image name:
    image: yahelgil/frontend-image:1.0

    # What is the container name:
    container_name: frontend-container 

    # Port mapping (hostPort:containerPort)
    ports:
      - 80:5173
    
    # Restart policy - when to restart the container:
    restart: unless-stopped

    # Constantly check if our server works:
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:5173', response => process.exit(response.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# -------------------------------------------------------------------------------------------------

# List all named-volumes we're using:
volumes:
  mysql-volume:
  images-volume:
  
  
